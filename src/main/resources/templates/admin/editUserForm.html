<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'admin')}">

<body>

  <h2 th:text="#{users.edit.title}">Edit User Account</h2>

  <form th:object="${userEditForm}"
        th:action="@{/admin/users/__${userEditForm.id}__/edit}"
        method="post"
        class="form-horizontal">

    <input type="hidden" th:field="*{id}" />

    <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('email')} ? 'has-error'">
      <label class="col-sm-2 control-label" th:text="#{users.email}">Email</label>
      <div class="col-sm-10">
        <input class="form-control" type="email" th:field="*{email}" />
        <span class="help-inline" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>
    </div>

    <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('password')} ? 'has-error'">
      <label class="col-sm-2 control-label" th:text="#{login.password.label}">Password</label>
      <div class="col-sm-10">
        <input class="form-control" type="password" name="password" id="password" />
        <small class="form-text text-muted" th:text="#{users.password.hint}">Leave blank to keep current password.</small>
        <span class="help-inline" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
      </div>
    </div>

    <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('role')} ? 'has-error'">
      <label class="col-sm-2 control-label" th:text="#{users.role}">Role</label>
      <div class="col-sm-10">
        <select class="form-control" id="roleSelect" th:field="*{role}">
          <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
        </select>
        <span class="help-inline" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></span>
      </div>
    </div>

    <div id="ownerFields" th:style="${userEditForm.role == T(org.springframework.samples.petclinic.security.Role).OWNER} ? '' : 'display:none'">
      <h4 th:text="#{users.ownerDetails.heading}">Owner Details</h4>

      <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('firstName')} ? 'has-error'">
        <label class="col-sm-2 control-label" th:text="#{firstName}">First Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" th:field="*{firstName}" />
          <span class="help-inline" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
        </div>
      </div>

      <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('lastName')} ? 'has-error'">
        <label class="col-sm-2 control-label" th:text="#{lastName}">Last Name</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" th:field="*{lastName}" />
          <span class="help-inline" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
        </div>
      </div>

      <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('address')} ? 'has-error'">
        <label class="col-sm-2 control-label" th:text="#{address}">Address</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" th:field="*{address}" />
          <span class="help-inline" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
        </div>
      </div>

      <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('city')} ? 'has-error'">
        <label class="col-sm-2 control-label" th:text="#{city}">City</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" th:field="*{city}" />
          <span class="help-inline" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></span>
        </div>
      </div>

      <div class="form-group has-feedback" th:classappend="${#fields.hasErrors('telephone')} ? 'has-error'">
        <label class="col-sm-2 control-label" th:text="#{telephone}">Telephone</label>
        <div class="col-sm-10">
          <input class="form-control" type="text" th:field="*{telephone}" />
          <span class="help-inline" th:if="${#fields.hasErrors('telephone')}" th:errors="*{telephone}"></span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{editUser}">Save Changes</button>
        <a th:href="@{/admin/users}" class="btn btn-secondary ms-2" th:text="#{deletePet.confirm.cancel}">Cancel</a>
      </div>
    </div>
  </form>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var roleSelect = document.getElementById('roleSelect');
      var ownerFields = document.getElementById('ownerFields');

      function toggleOwnerFields() {
        if (roleSelect.value === 'OWNER') {
          ownerFields.style.display = '';
        } else {
          ownerFields.style.display = 'none';
        }
      }

      roleSelect.addEventListener('change', toggleOwnerFields);
    });
  </script>

</body>

</html>
